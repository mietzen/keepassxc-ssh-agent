name: Integration Test (KeePassXC Browser Protocol)

on:
  schedule:
    # Run weekly to catch KeePassXC protocol changes
    - cron: '0 6 * * 1'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  Integration-Test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11

      - name: Install KeePassXC (latest stable)
        run: |
          sudo add-apt-repository -y ppa:phoerious/keepassxc
          sudo apt-get update
          sudo apt-get install -y keepassxc
          keepassxc-cli --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create test database
        run: |
          printf "testpassword\ntestpassword\n" | keepassxc-cli db-create --set-password /tmp/test.kdbx

      - name: Configure KeePassXC for browser integration
        run: |
          mkdir -p ~/.config/keepassxc
          cat > ~/.config/keepassxc/keepassxc.ini << 'EOCONFIG'
          [General]
          ConfigVersion=2

          [Browser]
          Enabled=true
          EOCONFIG
          echo "--- Config file contents ---"
          cat -A ~/.config/keepassxc/keepassxc.ini

      - name: Start Xvfb and D-Bus session
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

          # Start a D-Bus session bus (required for KeePassXC browser integration)
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> $GITHUB_ENV

      - name: Start KeePassXC
        run: |
          # Start KeePassXC with test database, password via stdin
          # Redirect output to log files for debugging
          echo "testpassword" | keepassxc --pw-stdin /tmp/test.kdbx \
            > /tmp/keepassxc-stdout.log 2> /tmp/keepassxc-stderr.log &
          KEEPASSXC_PID=$!
          echo "KEEPASSXC_PID=$KEEPASSXC_PID" >> $GITHUB_ENV

          # Wait for the browser socket to appear
          echo "Waiting for KeePassXC browser socket..."
          for i in $(seq 1 30); do
            SOCKET_PATH="${XDG_RUNTIME_DIR}/app/org.keepassxc.KeePassXC/org.keepassxc.KeePassXC.BrowserServer"
            LEGACY_PATH="${XDG_RUNTIME_DIR}/org.keepassxc.KeePassXC.BrowserServer"
            if [ -S "$SOCKET_PATH" ] || [ -S "$LEGACY_PATH" ]; then
              echo "Browser socket found after ${i}s"
              break
            fi
            # Check KeePassXC is still running
            if ! kill -0 $KEEPASSXC_PID 2>/dev/null; then
              echo "ERROR: KeePassXC process died"
              echo "--- stdout ---"
              cat /tmp/keepassxc-stdout.log 2>/dev/null || true
              echo "--- stderr ---"
              cat /tmp/keepassxc-stderr.log 2>/dev/null || true
              exit 1
            fi
            sleep 1
          done

          if [ ! -S "$SOCKET_PATH" ] && [ ! -S "$LEGACY_PATH" ]; then
            echo "ERROR: Browser socket not found after 30s"
            echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR"
            ls -la "${XDG_RUNTIME_DIR}/" 2>/dev/null || true
            ls -la "${XDG_RUNTIME_DIR}/app/org.keepassxc.KeePassXC/" 2>/dev/null || true
            exit 1
          fi

          # Give KeePassXC a moment to fully initialize the browser server
          sleep 2

      - name: Debug KeePassXC state
        run: |
          echo "--- KeePassXC process ---"
          ps aux | grep keepassxc || true
          echo "--- KeePassXC stdout ---"
          cat /tmp/keepassxc-stdout.log 2>/dev/null || true
          echo "--- KeePassXC stderr ---"
          cat /tmp/keepassxc-stderr.log 2>/dev/null || true
          echo "--- Socket file ---"
          SOCKET_PATH="${XDG_RUNTIME_DIR}/app/org.keepassxc.KeePassXC/org.keepassxc.KeePassXC.BrowserServer"
          LEGACY_PATH="${XDG_RUNTIME_DIR}/org.keepassxc.KeePassXC.BrowserServer"
          ls -la "$SOCKET_PATH" 2>/dev/null || ls -la "$LEGACY_PATH" 2>/dev/null || echo "No socket found"
          echo "--- Socket type check ---"
          file "$SOCKET_PATH" 2>/dev/null || file "$LEGACY_PATH" 2>/dev/null || true
          echo "--- Try socat connection ---"
          timeout 2 socat - UNIX-CONNECT:"$SOCKET_PATH" < /dev/null 2>&1 || \
          timeout 2 socat - UNIX-CONNECT:"$LEGACY_PATH" < /dev/null 2>&1 || \
          echo "socat connection failed (socat may not be installed)"
          echo "--- Python connection test ---"
          python3 -c "
          import socket, os
          xdg = os.environ.get('XDG_RUNTIME_DIR', '')
          for path in [
              os.path.join(xdg, 'app/org.keepassxc.KeePassXC/org.keepassxc.KeePassXC.BrowserServer'),
              os.path.join(xdg, 'org.keepassxc.KeePassXC.BrowserServer'),
          ]:
              if os.path.exists(path):
                  print(f'Found socket: {path}')
                  print(f'  stat: {os.stat(path)}')
                  try:
                      s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                      s.settimeout(2)
                      s.connect(path)
                      print('  Connected OK!')
                      s.close()
                  except Exception as e:
                      print(f'  Connect failed: {e}')
          "

      - name: Run integration tests
        env:
          KEEPASSXC_INTEGRATION_TEST: '1'
        run: |
          pytest tests/test_integration.py -v

      - name: Dump KeePassXC logs
        if: always()
        run: |
          echo "--- KeePassXC stdout ---"
          cat /tmp/keepassxc-stdout.log 2>/dev/null || true
          echo "--- KeePassXC stderr ---"
          cat /tmp/keepassxc-stderr.log 2>/dev/null || true

      - name: Stop KeePassXC
        if: always()
        run: |
          kill ${{ env.KEEPASSXC_PID }} 2>/dev/null || true
          kill ${{ env.DBUS_SESSION_BUS_PID }} 2>/dev/null || true
